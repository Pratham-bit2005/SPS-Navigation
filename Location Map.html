}

#navigateBtn:hover {

}

#startBtn {

</style>

function initMap() {
  map = new google.maps.Map(
    document.getElementById("map"),
    {
      center: { lat: 19.2360, lng: 73.1290 },
      zoom: 14
    }
  );

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer();

  directionsRenderer.setMap(map);

  loadParkingMarkers();
  getCurrentLocation();

}
     

function getCurrentLocation() {

    navigator.geolocation.getCurrentPosition(
        function(position) {

            userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            userMarker = new google.maps.Marker({
            position: userLocation,
            map: map,
            title: "Your Location",

            icon: {
            path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
            scale: 7,
            fillColor: "#4285F4",
            fillOpacity: 1,
            strokeColor: "#ffffff",
            strokeWeight: 2,
            rotation: 0
  }
});

            map.setCenter(userLocation);
            startNavigationTracking();

        },
        function() {
            alert("Unable to access location");
        }
    );
}


function startNavigationTracking() {

  navigator.geolocation.watchPosition(

    function(position) {

      const currentPos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      userMarker.setPosition(currentPos);

      map.panTo(currentPos);

      if (previousPos) {

        const heading =
          google.maps.geometry.spherical.computeHeading(
            previousPos,
            currentPos
          );

        userMarker.setIcon({
          path:
            google.maps.SymbolPath.FORWARD_CLOSED_ARROW,

          scale: 7,
          fillColor: "#4285F4",
          fillOpacity: 1,
          strokeColor: "#ffffff",
          strokeWeight: 2,
          rotation: heading
        });
      }

      previousPos = currentPos;
    },

    function(error) {
      console.log(error);
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0
    }
  );
}


function loadParkingMarkers() {
    parkingLots.forEach(parking => {
        const marker = new google.maps.Marker({
            position: {
                lat: parking.lat,
                lng: parking.lng
            },
            map: map,
            title: parking.name,
            icon: {
                url: "images/SPS-Map-logo2.png",
                scaledSize: new google.maps.Size(50, 50)
            }
        });

        marker.addListener("click", function () {
            selectedParking = parking;

            document.getElementById("parkingName").innerText = parking.name;
            document.getElementById("parkingAddress").innerText = "📍 " + parking.address;
            document.getElementById("parkingSlots").innerText = "🅿 Available Slots: " + parking.slots;
        });
    });
}

);
function navigateToParking() {

    if (!selectedParking) {
        alert("Please select a parking lot first.");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function (position) {

            const userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            console.log("User:", userLocation);
            console.log("Destination:", selectedParking);

            directionsService.route(
                {
                    origin: userLocation,
                    destination: {
                        lat: selectedParking.lat,
                        lng: selectedParking.lng
                    },
                    travelMode: google.maps.TravelMode.DRIVING
                },
                function (result, status) {

                    console.log("Status:", status);

                    if (status === "OK") {

    directionsRenderer.setDirections(result);

    document.getElementById(
      "startBtn"
    ).style.display = "block";
}
                    else {
                        alert("Route Error: " + status);
                    }
                }
            );
        },
        function (error) {
            console.log(error);
            alert("Could not get your location.")
        }
    );
}
 

document
.getElementById("startBtn")
.addEventListener(
  "click",
  function() {

    map.setZoom(18);

    navigator.geolocation.watchPosition(
      function(position) {

        const pos = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };

        userMarker.setPosition(pos);
        map.panTo(pos);
      },
      null,
      {
        enableHighAccuracy: true
      }
    );
  }
);
